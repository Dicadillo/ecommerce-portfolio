services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce_portfolio}
      POSTGRES_USER: ${POSTGRES_USER:-ecommerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Define POSTGRES_PASSWORD en el archivo .env}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - datos_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings_production
      DJANGO_DEPURACION: "False"
      DJANGO_COOKIES_SEGURAS: "False"
      DJANGO_REDIRECCION_HTTPS: "False"
      CORS_ORIGENES_PERMITIDOS: ${CORS_ORIGENES_PERMITIDOS:-http://localhost:5173,http://127.0.0.1:5173}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      DJANGO_EJECUTAR_MIGRACIONES: ${DJANGO_EJECUTAR_MIGRACIONES:-True}
      DJANGO_RECOLECTAR_ESTATICOS: ${DJANGO_RECOLECTAR_ESTATICOS:-True}
      USUARIO_DEMO_CONTRASENA: ${USUARIO_DEMO_CONTRASENA}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/salud/', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    init: true
    restart: unless-stopped
    stop_grace_period: 30s

volumes:
  datos_postgres:
